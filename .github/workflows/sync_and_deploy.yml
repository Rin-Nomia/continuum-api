name: 同步 z1_mvp 並部署 Continuum API (deploy-safe-split)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  SOURCE_REPO: Rin-Nomia/z1_mvp
  HF_USERNAME: RinNomia
  HF_SPACE: continuum-api
  HF_HUB_ETAG_TIMEOUT: "60"
  HF_HUB_DOWNLOAD_TIMEOUT: "60"

jobs:
  sync_and_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 關卡 1 - Checkout continuum-api
        uses: actions/checkout@v4
        with:
          path: continuum-api

      - name: 關卡 2 - Checkout z1_mvp
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.GH_PAT }}
          path: z1_mvp

      - name: 關卡 3 - 複製 pipeline, core, configs
        run: |
          echo "同步核心模組..."
          rm -rf continuum-api/pipeline continuum-api/core continuum-api/configs

          cp -r z1_mvp/pipeline continuum-api/
          cp -r z1_mvp/core continuum-api/
          cp -r z1_mvp/configs continuum-api/

          echo "同步完成"
          ls -lh continuum-api/

      - name: 關卡 4 - Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 關卡 5 - 測試 Pipeline
        working-directory: continuum-api
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pip install -r requirements.txt

          python << 'PYTEST'
          from pipeline.z1_pipeline import Z1Pipeline
          pipeline = Z1Pipeline(debug=True)

          text = "I don't know what to do anymore. Everything I try fails."
          result = pipeline.process(text)

          if result.get("error"):
              raise SystemExit("Pipeline 測試失敗")

          print("Pipeline OK")
          PYTEST

      - name: 關卡 5.5 - 建立 dist/
        working-directory: continuum-api
        run: |
          rm -rf dist
          mkdir dist

          rsync -av \
            --exclude ".git" \
            --exclude "logs" \
            --exclude "__pycache__" \
            --exclude "*.pyc" \
            --exclude ".pytest_cache" \
            --exclude ".mypy_cache" \
            --exclude ".venv" \
            --exclude "venv" \
            --exclude "node_modules" \
            --exclude "*.parquet" \
            --exclude "*.jsonl" \
            --exclude "*.mp4" \
            --exclude "*.mov" \
            --exclude "*.zip" \
            ./ dist/

          echo "dist 大小："
          du -sh dist

      - name: 關卡 6 - Deploy to HuggingFace (split upload)
        working-directory: continuum-api
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub

          python << 'PYDEPLOY'
          import os, time
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"]
          repo_id = f"{os.environ['HF_USERNAME']}/{os.environ['HF_SPACE']}"

          api = HfApi(token=token)

          try:
              api.space_info(repo_id)
          except Exception:
              api.create_repo(repo_id=repo_id, repo_type="space", space_sdk="docker")

          print("分批上傳 dist 內容...")

          # 修正：加入 logger.py 和 status.html
          files = [
              "app.py",
              "Dockerfile",
              "requirements.txt",
              "README.md",
              "logger.py",
              "status.html",
          ]

          folders = ["pipeline", "core", "configs", "utils", "docs", "license"]

          for f in files:
              path = f"dist/{f}"
              if os.path.exists(path):
                  for i in range(3):
                      try:
                          api.upload_file(
                              path_or_fileobj=path,
                              path_in_repo=f,
                              repo_id=repo_id,
                              repo_type="space",
                              commit_message=f"deploy {f}",
                          )
                          print(f"OK: {f}")
                          break
                      except Exception as e:
                          print(f"FAIL: {f} retry {i+1}: {e}")
                          time.sleep(3)
              else:
                  print(f"SKIP: {f} (not found)")

          for folder in folders:
              path = f"dist/{folder}"
              if os.path.exists(path):
                  for i in range(3):
                      try:
                          api.upload_folder(
                              folder_path=path,
                              path_in_repo=folder,
                              repo_id=repo_id,
                              repo_type="space",
                              commit_message=f"deploy {folder}/",
                          )
                          print(f"OK: {folder}/")
                          break
                      except Exception as e:
                          print(f"FAIL: {folder}/ retry {i+1}: {e}")
                          time.sleep(5)
              else:
                  print(f"SKIP: {folder}/ (not found)")

          print("部署完成")
          print(f"https://huggingface.co/spaces/{repo_id}")
          PYDEPLOY
