name: 部署 Continuum API 到 HuggingFace

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  HF_USERNAME: RinNomia
  HF_SPACE: continuum-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install HuggingFace Hub
        run: |
          pip install huggingface_hub
      
      - name: Deploy to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python << 'PYDEPLOY'
          import os
          import time
          from huggingface_hub import HfApi
          from datetime import datetime
          
          token = os.environ['HF_TOKEN']
          username = os.environ['HF_USERNAME']
          space_name = os.environ['HF_SPACE']
          repo_id = f"{username}/{space_name}"
          
          print(f"🚀 部署到: {repo_id}")
          
          api = HfApi(token=token)
          
          # 確保 Space 存在
          try:
              api.space_info(repo_id)
              print(f"✅ Space 已存在")
          except:
              print(f"⚠️  建立新 Space...")
              api.create_repo(
                  repo_id=repo_id,
                  repo_type="space",
                  space_sdk="docker"
              )
              print(f"✅ Space 建立成功")
          
          print("\n📤 上傳檔案...")
          
          # 分批上傳，避免 timeout
          files_to_upload = [
              "app.py",
              "Dockerfile",
              "requirements.txt",
              "README.md",
              "playground.html",
              "c3_dashboard.py",
              "capture_dashboard_preview.py"
          ]
          
          for file in files_to_upload:
              if os.path.exists(file):
                  try:
                      api.upload_file(
                          path_or_fileobj=file,
                          path_in_repo=file,
                          repo_id=repo_id,
                          repo_type="space"
                      )
                      print(f"✅ {file}")
                  except Exception as e:
                      print(f"⚠️  {file} 上傳失敗: {e}")
          
          # 上傳資料夾
          folders = ["pipeline", "core", "configs", "utils", "docs", "license"]
          for folder in folders:
              if os.path.exists(folder):
                  try:
                      api.upload_folder(
                          folder_path=folder,
                          path_in_repo=folder,
                          repo_id=repo_id,
                          repo_type="space",
                          ignore_patterns=["*.pyc", "__pycache__"]
                      )
                      print(f"✅ {folder}/")
                  except Exception as e:
                      print(f"⚠️  {folder}/ 上傳失敗: {e}")
          
          print("\n" + "=" * 50)
          print("🎉 部署完成！")
          print("=" * 50)
          print(f"\n📍 Space URL:")
          print(f"   https://huggingface.co/spaces/{repo_id}")
          print(f"\n📍 API 端點:")
          print(f"   https://rinnomia-{space_name}.hf.space/health")
          print(f"   https://rinnomia-{space_name}.hf.space/docs")
          print("\n⏳ Space 需要 2-5 分鐘啟動")
          print("=" * 50)
          PYDEPLOY
---

